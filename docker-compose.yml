services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jk-api
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - jk-network
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  jk-network:
    driver: bridge