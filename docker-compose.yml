services:
  postgres:
    image: postgres:16-alpine
    container_name: jk-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-jk_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - jk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-jk_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jk-api
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=jk-postgres
      # Real-time gold sidecar (tv-price-svc) reached on the host's localhost:8000
      - GOLD_REALTIME_URL=http://host.docker.internal:8000
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - jk-network
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  jk-network:
    driver: bridge

volumes:
  postgres-data: